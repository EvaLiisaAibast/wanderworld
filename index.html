<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wanderworld</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div id="join-screen">
  <div class="join-box">
    <h1 class="logo">Wanderworld</h1>
    <p>A shared pixel world. Roam, chat, exist.</p>

    <input id="username-input" placeholder="Enter your name..." />
    <button id="join-btn">Enter World</button>

    <p id="join-error"></p>
  </div>
</div>

<div id="game-screen" class="hidden">

  <div id="hud">
    <span id="hud-player-name"></span>

    <div>
      <span id="player-count">👥 0</span>
      <button id="talk-btn">💬 Talk</button>
      <button id="leave-btn">✖ Leave</button>
    </div>
  </div>

  <div id="world-wrapper">
    <div id="world-container"></div>
    <div id="history-panel">
      <h3>💬 chat history</h3>
      <div id="history-log">
        <div class="history-empty">no messages yet 🌱</div>
      </div>
    </div>
  </div>

</div>

<div id="talk-panel" class="hidden">
  <div class="talk-box">
    <p>What do you say?</p>
    <textarea id="talk-input"></textarea>

    <div>
      <button id="talk-send-btn">Send</button>
      <button id="talk-cancel-btn">Cancel</button>
    </div>

    <p id="talk-error"></p>
  </div>
</div>

<img class="floating-sticker" src="https://cdn140.picsart.com/321871657366211.png">

<iframe class="spotify-player"
  src="https://open.spotify.com/embed/playlist/5jvzy0iygMijho1O0EUMvl"
  allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>

<script src="game.js"></script>
</body>
</html>
