<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wanderworld</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- JOIN SCREEN -->
  <div id="join-screen">
    <div class="join-box">
      <div class="join-title-row">
        <img src="https://tinkr.tech/sdb_apps/wanderworld/images/cow.png" class="join-cow" />
        <h1 class="join-title">Wanderworld</h1>
        <img src="https://tinkr.tech/sdb_apps/wanderworld/images/cow.png" class="join-cow flip" />
      </div>
      <p class="join-sub">A shared pixel world. Roam, chat, exist.</p>
      <div class="join-field-row">
        <input id="username-input" type="text" maxlength="20" placeholder="Enter your name..." spellcheck="false" />
        <button id="join-btn">Enter World</button>
      </div>
      <p id="join-error" class="join-error"></p>
      <div class="join-sprites">
        <img src="https://tinkr.tech/sdb_apps/wanderworld/images/player.png" />
        <img src="https://tinkr.tech/sdb_apps/wanderworld/images/skeleton.png" />
        <img src="https://tinkr.tech/sdb_apps/wanderworld/images/chicken.png" />
        <img src="https://tinkr.tech/sdb_apps/wanderworld/images/pig.png" />
        <img src="https://tinkr.tech/sdb_apps/wanderworld/images/sheep.png" />
        <img src="https://tinkr.tech/sdb_apps/wanderworld/images/slime.png" />
      </div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="hidden">

    <!-- HUD top bar -->
    <div id="hud">
      <div class="hud-left">
        <span class="hud-logo">🌍 Wanderworld</span>
        <span id="hud-player-name" class="hud-name"></span>
      </div>
      <div class="hud-right">
        <span id="player-count" class="hud-count">👥 0</span>
        <button id="talk-btn" class="hud-btn">💬 Talk</button>
        <button id="leave-btn" class="hud-btn danger">✖ Leave</button>
      </div>
    </div>

    <!-- WORLD MAP WRAPPER -->
    <div id="world-wrapper">
      <div id="world-container"></div>
    </div>

    <!-- TALK PANEL -->
    <div id="talk-panel" class="hidden">
      <div class="talk-box">
        <p class="talk-label">What do you say?</p>
        <textarea id="talk-input" maxlength="200" placeholder="Say something..." rows="3"></textarea>
        <div class="talk-actions">
          <button id="talk-send-btn">Send</button>
          <button id="talk-cancel-btn" class="cancel">Cancel</button>
        </div>
        <p id="talk-error" class="join-error"></p>
      </div>
    </div>

    <!-- CLICK HINT -->
    <div id="click-hint">Click the map to move</div>

  </div>

  <script src="game.js"></script>
</body>
</html>
